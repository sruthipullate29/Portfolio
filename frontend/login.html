<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Body setup */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh; /* ensures full viewport height */
      background: white;
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Header */
    header {
      width: 100%; /* aligns header with body */
    background: #c293e1;
    color: black;
    padding: 40px;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

    header h1 {
      margin: 0;
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    header h3 {
      margin: 8px 0 0;
      font-size: 22px;
      font-weight: normal;
    }

    /* Login box */
    .login-container {
      background: rgba(255,255,255,0.95);
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      width: 400px;
      text-align: center;
      margin: 50px auto;
      transition: transform 0.3s ease;
    }
    .login-container:hover {
      transform: scale(1.03);
    }
    .login-container h2 {
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: bold;
      color: #2196F3;
    }
    .login-container input {
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 18px;
      transition: border-color 0.3s ease;
    }
    .login-container input:focus {
      border-color: #2196F3;
      outline: none;
      box-shadow: 0 0 8px rgba(33,150,243,0.5);
    }

    /* Buttons */
    .button-group {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
    }
    .button-group button {
      flex: 1;
      margin: 0 8px;
      padding: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      transition: transform 0.2s ease, background-color 0.3s ease;
    }
    .login-btn {
      background: linear-gradient(135deg, #4CAF50, #81C784);
      color: white;
    }
    .signup-btn {
      background: linear-gradient(135deg, #2196F3, #64B5F6);
      color: white;
    }
    .login-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #388E3C, #66BB6A);
    }
    .signup-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #1976D2, #42A5F5);
    }

    /* Footer */
    footer {
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: auto; /* pushes footer to bottom */
      font-size: 20px;
    }
  </style>
</head>
<body>

  <!-- Header Section -->
  <header>
    <h1>Welcome Job Portfolio</h1>
    <h3>Find your Passion</h3>
  </header>

  <!-- Login Box -->
  <div class="login-container">
    <h2>Login</h2>
    <form>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <div class="button-group">
        <button type="submit" class="login-btn">Login</button>
        <button type="button" class="signup-btn" onclick="window.location.href='signup.html'">Sign Up</button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 NextStep. All rights reserved.</p>
  </footer>

</body>
</html>
