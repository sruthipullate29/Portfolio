<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;   /* Stack header, content, footer vertically */
      min-height: 100vh;
      overflow-y: auto;         /* Enable vertical scrolling */
    }

    header {
      width: 100%;
      background: #c293e1;
      color: black;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .signup-container {
      background: #fff;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 1400px;
      margin: 30px auto;
    }

    .signup-container h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 40px;
      color: #2196F3;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .form-group input {
      padding: 22px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 20px;
      width: 100%;
    }

    .signup-container button {
      width: 100%;
      padding: 25px;
      margin-top: 40px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 22px;
      background: linear-gradient(135deg, #2196F3, #64B5F6);
      color: white;
      transition: transform 0.2s ease, background-color 0.3s ease;
    }

    .signup-container button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #1976D2, #42A5F5);
    }

    .error {
      color: red;
      font-size: 16px;
      margin-top: 10px;
      text-align: center;
    }

    footer {
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: auto;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome Job Portfolio</h1>
    <h3>Find your Passion</h3>
  </header>

  <div class="signup-container">
    <h2>Create Your Account</h2>
    <form id="signupForm">
      <div class="form-grid">
        <div class="form-group"><label>First Name</label><input type="text" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" required></div>

        <div class="form-group"><label>Age</label><input type="number" min="1" required></div>
        <div class="form-group"><label>Date of Birth</label><input type="date" required></div>

        <div class="form-group"><label>Place</label><input type="text" required></div>
        <div class="form-group"><label>Year of Pass Out</label><input type="number" required></div>

        <div class="form-group"><label>10th Grade Score</label><input type="text" required></div>
        <div class="form-group"><label>12th Grade Score</label><input type="text" required></div>

        <div class="form-group"><label>10th School</label><input type="text" required></div>
        <div class="form-group"><label>12th School</label><input type="text" required></div>

        <div class="form-group"><label>Father's Name</label><input type="text" required></div>
        <div class="form-group"><label>Mother's Name</label><input type="text" required></div>

        <div class="form-group"><label>Current CGPA</label><input type="text" required></div>
        <div class="form-group"><label>Email</label><input type="email" required></div>

        <div class="form-group"><label>Create Password</label><input type="password" id="password" required></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" required></div>
      </div>

      <div id="errorMessage" class="error"></div>
      <button type="submit">Create Account</button>
    </form>
  </div>

  <footer>
    <p>© 2026 NextStep. All rights reserved.</p>
  </footer>

  <script>
    const form = document.getElementById('signupForm');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', function(event) {
      if (password.value !== confirmPassword.value) {
        event.preventDefault();
        errorMessage.textContent = "Passwords do not match!";
      } else {
        errorMessage.textContent = "";
        alert("Account Created Successfully!");
      }
    });
  </script>
</body>
</html>
